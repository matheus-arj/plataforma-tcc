version: '3.8'
services:
  plataforma_tcc_postgress:
    image: postgres
    container_name: plataforma_tcc_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - .docker/pgdata:/var/lib/postgresql/data
